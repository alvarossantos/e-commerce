{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0"><i class="fas fa-boxes me-2"></i> Inventário de Produtos</h3>
        <div>
            <a href="/admin" class="btn btn-outline-secondary rounded-pill px-4 me-2">Voltar</a>
            <a href="/admin/produtos/novo" class="btn btn-primary rounded-pill px-4 shadow-sm">
                <i class="fas fa-plus me-2"></i> Novo Produto
            </a>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-4">Produto</th>
                        <th>Categoria</th>
                        <th>SKU</th>
                        <th>Preço</th>
                        <th class="text-end pe-4">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in produtos %}
                    <tr>
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <img src="{{ p.url_imagem if p.url_imagem else '/static/img/produtos/placeholder.png' }}" class="rounded border me-3" style="width: 45px; height: 45px; object-fit: contain;">
                                <span class="fw-bold">{{ p.nome }}</span>
                            </div>
                        </td>
                        <td><span class="badge bg-light text-dark border">{{ p.categoria }}</span></td>
                        <td class="text-muted small">{{ p.sku }}</td>
                        <td class="fw-bold text-primary">R$ {{ "%.2f"|format(p.preco) }}</td>
                        <td class="text-end pe-4">
                            <a href="/admin/produtos/editar/{{ p.id }}" class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></a>
                            <form action="/admin/produtos/excluir/{{ p.id }}" method="POST" class="d-inline" onsubmit="return confirm('Tem certeza que deseja excluir este produto?')">
                                <button class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
