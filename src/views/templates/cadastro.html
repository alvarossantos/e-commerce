{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-user-plus fa-3x text-primary mb-3"></i>
                    <h2 class="fw-bold">Criar Conta</h2>
                    <p class="text-muted">Junte-se à Álvaro Store e aproveite ofertas exclusivas.</p>
                </div>

                <form action="{{ url_for('cadastro') }}" method="POST" class="needs-validation">
                    <div class="mb-3">
                        <label for="nome" class="form-label fw-semibold">Nome Completo</label>
                        <input type="text" class="form-control form-control-lg bg-light border-0" id="nome" name="nome" placeholder="Ex: Álvaro Santos" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label fw-semibold">E-mail</label>
                            <input type="email" class="form-control form-control-lg bg-light border-0" id="email" name="email" placeholder="nome@exemplo.com" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="senha" class="form-label fw-semibold">Senha</label>
                            <input type="password" class="form-control form-control-lg bg-light border-0" id="senha" name="senha" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="cpf" class="form-label fw-semibold">CPF</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="data_nasc" class="form-label fw-semibold">Data de Nascimento</label>
                            <input type="date" class="form-control form-control-lg bg-light border-0" id="data_nasc" name="data_nasc" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="telefone" class="form-label fw-semibold">Telefone</label>
                        <input type="tel" class="form-control form-control-lg bg-light border-0" id="telefone" name="telefone" placeholder="(00) 00000-0000">
                    </div>

                    <div class="mb-4">
                        <label for="endereco" class="form-label fw-semibold">Endereço de Entrega</label>
                        <textarea class="form-control bg-light border-0" id="endereco" name="endereco" rows="2" placeholder="Rua, número, bairro e cidade..." required></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">Finalizar Cadastro</button>
                        <a href="{{ url_for('login') }}" class="btn btn-link text-decoration-none">Já tem uma conta? Faça Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    (() => {
      'use strict'
      const forms = document.querySelectorAll('.needs-validation')
      Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
          if (!form.checkValidity()) {
            event.preventDefault()
            event.stopPropagation()
          }
          form.classList.add('was-validated')
        }, false)
      })
    })()
</script>
{% endblock %}
