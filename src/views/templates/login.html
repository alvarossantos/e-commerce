{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-sign-in-alt fa-3x text-primary mb-3"></i>
                    <h2 class="fw-bold">Bem-vindo de volta</h2>
                    <p class="text-muted">Faça login para acessar a sua conta Álvaro Store.</p>
                </div>

                <form action="{{ url_for('login') }}" method="POST" class="needs-validation">
                    <div class="mb-4">
                        <label for="email" class="form-label fw-semibold">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="fas fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control form-control-lg bg-light border-0" id="email" name="email" placeholder="nome@exemplo.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="senha" class="form-label fw-semibold">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" class="form-control form-control-lg bg-light border-0" id="senha" name="senha" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">Entrar</button>
                    </div>

                    <div class="text-center mt-4 pt-3 border-top">
                        <p class="text-muted mb-0">Ainda não tem conta?</p>
                        <a href="{{ url_for('cadastro') }}" class="btn btn-link text-decoration-none fw-bold">Criar nova conta</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    (() => {
      'use strict'
      const forms = document.querySelectorAll('.needs-validation')
      Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
          if (!form.checkValidity()) {
            event.preventDefault()
            event.stopPropagation()
          }
          form.classList.add('was-validated')
        }, false)
      })
    })()
</script>
{% endblock %}
